<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="全栈身体管理系统 V4 — 增肌训练·睡眠追踪·习惯打卡·多设备同步">
    <title>💪 身体管理 V4</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>

<body>

    <!-- App 主内容 -->
    <div id="app-content" class="page active"></div>

    <!-- 底部导航 -->
    <nav id="bottom-nav" class="bottom-nav" style="display:none">
        <button class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
            <span class="nav-icon">📊</span><span>仪表盘</span>
        </button>
        <button class="nav-item" data-page="weight" onclick="App.navigate('weight')">
            <span class="nav-icon">⚖️</span><span>体重</span>
        </button>
        <button class="nav-item" data-page="training" onclick="App.navigate('training')">
            <span class="nav-icon">🏋️</span><span>训练</span>
        </button>
        <button class="nav-item" data-page="more" onclick="App.navigate('more')">
            <span class="nav-icon">⚙️</span><span>更多</span>
        </button>
    </nav>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDK (CDN, compat v12.10.0) -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>

    <!-- App Scripts (按依赖顺序) -->
    <script src="js/firebase-config.local.js" onerror="console.log('No local config, using defaults')"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/store.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
